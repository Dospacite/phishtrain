services:
  api:
    build: .
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: phishtrain
      MONGO_COLLECTION: raw
      MONGO_JOBS_COLLECTION: jobs
      MONGO_CURATED_COLLECTION: curated
      SCREENSHOT_BUCKET: screenshots
      URLSCAN_API_KEY: ${URLSCAN_API_KEY}
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: scrape
      PREFLIGHT_QUEUE_NAME: preflight
      WORKER_CONCURRENCY: "4"
      PIPELINE_ENQUEUE_BATCH_SIZE: "50"
      PREFLIGHT_TIMEOUT_SECONDS: "8"
      SCRAPE_WAIT_MS: "10000"
      SCRAPE_URL_TIMEOUT_MS: "30000"
      RQ_JOB_TIMEOUT_SECONDS: "45"
      SPIDER_MAX_CHILD_PAGES: "25"
      SPIDER_CANDIDATE_LIMIT: "120"
      SPIDER_PAGE_WAIT_MS: "1500"
      SPIDER_PAGE_TIMEOUT_MS: "8000"
      SPIDER_JOB_TIMEOUT_SECONDS: "180"
      ALLOW_PRIVATE_URLS: "false"
      DASHBOARD_PASSWORD: ${DASHBOARD_PASSWORD}
      DASHBOARD_LOG_TAIL: "200"
      TOP_1M_PIPELINE_CSV_PATH: /app/top-1m.csv
      TOP_1M_PIPELINE_PROGRESS_PATH: /app/state/top-1m-spider-progress.json
      TOP_1M_PIPELINE_CONTROL_PATH: /app/state/top-1m-spider-control.json
      URLSCAN_PIPELINE_PROGRESS_PATH: /app/state/urlscan-phishing-progress.json
      URLSCAN_PIPELINE_CONTROL_PATH: /app/state/urlscan-phishing-control.json
    ports:
      - "0.0.0.0:8000:8000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./top-1m.csv:/app/top-1m.csv:ro
      - pipeline-state:/app/state
    shm_size: "1gb"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build: .
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: phishtrain
      MONGO_COLLECTION: raw
      MONGO_JOBS_COLLECTION: jobs
      MONGO_CURATED_COLLECTION: curated
      SCREENSHOT_BUCKET: screenshots
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: scrape
      PREFLIGHT_QUEUE_NAME: preflight
      WORKER_CONCURRENCY: "4"
      PIPELINE_ENQUEUE_BATCH_SIZE: "50"
      PREFLIGHT_TIMEOUT_SECONDS: "8"
      SCRAPE_WAIT_MS: "10000"
      SCRAPE_URL_TIMEOUT_MS: "30000"
      RQ_JOB_TIMEOUT_SECONDS: "45"
      SPIDER_MAX_CHILD_PAGES: "25"
      SPIDER_CANDIDATE_LIMIT: "120"
      SPIDER_PAGE_WAIT_MS: "1500"
      SPIDER_PAGE_TIMEOUT_MS: "8000"
      SPIDER_JOB_TIMEOUT_SECONDS: "180"
      ALLOW_PRIVATE_URLS: "false"
    command: ["python", "-m", "app.worker"]
    shm_size: "1gb"
    depends_on:
      - redis

  preflight-worker:
    build: .
    environment:
      MONGO_URI: ${MONGO_URI}
      MONGO_DB: phishtrain
      MONGO_COLLECTION: raw
      MONGO_JOBS_COLLECTION: jobs
      MONGO_CURATED_COLLECTION: curated
      SCREENSHOT_BUCKET: screenshots
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: preflight
      PREFLIGHT_QUEUE_NAME: preflight
      WORKER_CONCURRENCY: "12"
      PIPELINE_ENQUEUE_BATCH_SIZE: "50"
      PREFLIGHT_TIMEOUT_SECONDS: "8"
      SCRAPE_WAIT_MS: "10000"
      SCRAPE_URL_TIMEOUT_MS: "30000"
      RQ_JOB_TIMEOUT_SECONDS: "45"
      SPIDER_MAX_CHILD_PAGES: "25"
      SPIDER_CANDIDATE_LIMIT: "120"
      SPIDER_PAGE_WAIT_MS: "1500"
      SPIDER_PAGE_TIMEOUT_MS: "8000"
      SPIDER_JOB_TIMEOUT_SECONDS: "180"
      ALLOW_PRIVATE_URLS: "false"
    command: ["python", "-m", "app.worker"]
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  redis-data:
  pipeline-state:
