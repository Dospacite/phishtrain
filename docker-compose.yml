services:
  api:
    build: .
    env_file:
      - .env
    environment:
      MONGO_DB: phishtrain
      MONGO_COLLECTION: raw
      MONGO_JOBS_COLLECTION: jobs
      SCREENSHOT_BUCKET: screenshots
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: scrape
      WORKER_CONCURRENCY: "4"
      SCRAPE_WAIT_MS: "10000"
      SCRAPE_URL_TIMEOUT_MS: "30000"
      RQ_JOB_TIMEOUT_SECONDS: "45"
      SPIDER_MAX_CHILD_PAGES: "25"
      SPIDER_CANDIDATE_LIMIT: "120"
      SPIDER_PAGE_WAIT_MS: "1500"
      SPIDER_PAGE_TIMEOUT_MS: "8000"
      SPIDER_JOB_TIMEOUT_SECONDS: "180"
      ALLOW_PRIVATE_URLS: "false"
    ports:
      - "8000:8000"
    shm_size: "1gb"
    depends_on:
      - redis
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  worker:
    build: .
    env_file:
      - .env
    environment:
      MONGO_DB: phishtrain
      MONGO_COLLECTION: raw
      MONGO_JOBS_COLLECTION: jobs
      SCREENSHOT_BUCKET: screenshots
      REDIS_URL: redis://redis:6379/0
      RQ_QUEUE_NAME: scrape
      WORKER_CONCURRENCY: "4"
      SCRAPE_WAIT_MS: "10000"
      SCRAPE_URL_TIMEOUT_MS: "30000"
      RQ_JOB_TIMEOUT_SECONDS: "45"
      SPIDER_MAX_CHILD_PAGES: "25"
      SPIDER_CANDIDATE_LIMIT: "120"
      SPIDER_PAGE_WAIT_MS: "1500"
      SPIDER_PAGE_TIMEOUT_MS: "8000"
      SPIDER_JOB_TIMEOUT_SECONDS: "180"
      ALLOW_PRIVATE_URLS: "false"
    command: ["python", "-m", "app.worker"]
    shm_size: "1gb"
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

volumes:
  redis-data:
